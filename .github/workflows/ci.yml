name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    timeout-minutes: 20
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    env:
      WHITAKER_INSTALLER_VERSION: '0.2.5'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - name: Checkout repository
        # v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.13'
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
            **/scripts/*.py
      - name: Install nfpm
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/install-nfpm
      - name: Setup Bun
        if: matrix.os == 'ubuntu-latest'
        # v2.0.2
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
      - name: Setup Bun (macOS)
        if: matrix.os == 'macos-15'
        # v2.0.2
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
      - name: Install action-validator
        run: bun install -g @action-validator/core @action-validator/cli
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: make check-fmt
        shell: bash
      - name: Setup Rust
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-rust
      - name: Cache Whitaker installer
        if: matrix.os == 'ubuntu-latest'
        # v4.3.0
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm whitaker-installer@${{ env.WHITAKER_INSTALLER_VERSION }}
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version ${{ env.WHITAKER_INSTALLER_VERSION }}
            fi
          fi
          whitaker-installer
      - name: Run lint checks
        if: matrix.os == 'ubuntu-latest'
        run: make lint
        shell: bash
      - name: Run tests
        run: |
          uv sync --group dev
          uv run pytest
        env:
          PYTHONIOENCODING: utf-8
        shell: bash

  python-tests-windows:
    timeout-minutes: 20
    permissions:
      contents: read
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        # v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.13'
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
            **/scripts/*.py
      - name: Run tests
        run: |
          uv sync --group dev
          uv run pytest
        env:
          PYTHONIOENCODING: utf-8
        shell: bash
