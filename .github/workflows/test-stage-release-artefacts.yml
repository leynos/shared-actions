name: Test stage-release-artefacts
on:
  workflow_dispatch:
  pull_request:

jobs:
  test-stage-artefacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Create test artefacts
        uses: ./.github/actions/create-test-artefacts

      - name: Create staging config
        run: |
          cat > "${TEST_WORKSPACE}/test-staging.toml" << 'EOF'
          [common]
          bin_name = "test-app"
          dist_dir = "dist"
          checksum_algorithm = "sha256"

          [[common.artefacts]]
          source = "target/release/{bin_name}"
          output = "binary_path"

          [[common.artefacts]]
          source = "target/release/{bin_name}.1"
          output = "man_path"
          required = false

          [targets.linux-x86_64]
          platform = "linux"
          arch = "x86_64"
          target = "x86_64-unknown-linux-gnu"
          EOF

      - name: Stage release artefacts
        id: stage
        uses: ./.github/actions/stage-release-artefacts
        with:
          config-file: ${{ env.TEST_WORKSPACE }}/test-staging.toml
          target: linux-x86_64

      - name: Verify outputs
        run: |
          echo "artifact-dir=${{ steps.stage.outputs.artifact-dir }}"
          echo "staged-files=${{ steps.stage.outputs.staged-files }}"
          # Verify staging directory exists
          [[ -d "${{ steps.stage.outputs.artifact-dir }}" ]]
          # Verify binary was staged
          [[ -f "${{ steps.stage.outputs.binary-path }}" ]]
          # Verify checksum sidecar was created
          [[ -f "${{ steps.stage.outputs.binary-path }}.sha256" ]]

  test-stage-artefacts-env-overrides:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Create test artefacts
        uses: ./.github/actions/create-test-artefacts

      - name: Create staging config
        id: config
        run: |
          cat > "${TEST_WORKSPACE}/test-staging.toml" << 'EOF'
          [common]
          bin_name = "test-app"
          dist_dir = "dist"
          checksum_algorithm = "sha256"

          [[common.artefacts]]
          source = "target/release/{bin_name}"
          output = "binary_path"

          [[common.artefacts]]
          source = "target/release/{bin_name}.1"
          output = "man_path"
          required = false

          [targets.linux-x86_64]
          platform = "linux"
          arch = "x86_64"
          target = "x86_64-unknown-linux-gnu"
          EOF
          # Use INPUT_* env vars (set by act or external runner) if provided, otherwise defaults
          config_file="${INPUT_CONFIG_FILE:-${TEST_WORKSPACE}/test-staging.toml}"
          target="${INPUT_TARGET:-linux-x86_64}"
          {
            echo "config_file=${config_file}"
            echo "target=${target}"
          } >> "$GITHUB_OUTPUT"

      - name: Stage release artefacts with env overrides
        id: stage
        uses: ./.github/actions/stage-release-artefacts
        with:
          config-file: ${{ steps.config.outputs.config_file }}
          target: ${{ steps.config.outputs.target }}

      - name: Verify outputs
        run: |
          echo "artifact-dir=${{ steps.stage.outputs.artifact-dir }}"
          echo "staged-files=${{ steps.stage.outputs.staged-files }}"
          [[ -d "${{ steps.stage.outputs.artifact-dir }}" ]]
          [[ -f "${{ steps.stage.outputs.binary-path }}" ]]
          [[ -f "${{ steps.stage.outputs.binary-path }}.sha256" ]]

  test-stage-artefacts-powershell-help:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Create test artefacts
        uses: ./.github/actions/create-test-artefacts
        with:
          workspace-suffix: powershell

      - name: Create PowerShell sidecar artefacts
        run: |
          set -euo pipefail
          module_dir="${TEST_WORKSPACE}/target/orthohelp/x86_64-pc-windows-msvc/release/powershell/MyTool"
          mkdir -p "${module_dir}/en-US"
          echo "module" > "${module_dir}/MyTool.psm1"
          echo "manifest" > "${module_dir}/MyTool.psd1"
          echo "help" > "${module_dir}/en-US/MyTool-help.xml"

      - name: Create staging config
        run: |
          cat > "${TEST_WORKSPACE}/test-staging.toml" << 'EOF'
          [common]
          bin_name = "test-app"
          dist_dir = "dist"
          checksum_algorithm = "sha256"

          [[common.artefacts]]
          source = "target/release/{bin_name}"
          output = "binary_path"

          [targets.windows-x86_64]
          platform = "windows"
          arch = "x86_64"
          target = "x86_64-pc-windows-msvc"

          [[targets.windows-x86_64.artefacts]]
          source = "target/orthohelp/{target}/release/powershell/MyTool/MyTool.psm1"
          dest = "MyTool/MyTool.psm1"
          required = false

          [[targets.windows-x86_64.artefacts]]
          source = "target/orthohelp/{target}/release/powershell/MyTool/MyTool.psd1"
          dest = "MyTool/MyTool.psd1"
          required = false

          [[targets.windows-x86_64.artefacts]]
          source = "target/orthohelp/{target}/release/powershell/MyTool/en-US/MyTool-help.xml"
          dest = "MyTool/en-US/MyTool-help.xml"
          required = false
          EOF

      - name: Stage release artefacts with PowerShell help
        id: stage
        uses: ./.github/actions/stage-release-artefacts
        with:
          config-file: ${{ env.TEST_WORKSPACE }}/test-staging.toml
          target: windows-x86_64
          ps-module-name: MyTool
          normalize-windows-paths: "true"

      - name: Verify PowerShell outputs
        run: |
          echo "powershell_help_dir=${{ steps.stage.outputs.powershell_help_dir }}"
          [[ -d "${{ steps.stage.outputs.powershell_help_dir }}" ]]
          [[ -f "${{ steps.stage.outputs.powershell_help_dir }}/MyTool.psm1" ]]
          [[ -f "${{ steps.stage.outputs.powershell_help_dir }}/en-US/MyTool-help.xml" ]]

  test-stage-artefacts-binstall:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Create test workspace
        uses: ./.github/actions/create-test-artefacts
        with:
          workspace-suffix: binstall

      - name: Create cargo-binstall inputs
        run: |
          mkdir -p "${TEST_WORKSPACE}/target/x86_64-unknown-linux-gnu/release"
          cat > "${TEST_WORKSPACE}/Cargo.toml" << 'EOF'
          [package]
          name = "test-app"
          version = "1.2.3"
          edition = "2021"

          [[bin]]
          name = "test-app"
          path = "src/main.rs"

          [package.metadata.binstall.overrides.'cfg(target_os = "linux")']
          pkg-url = "{ repo }/releases/download/v{ version }/{ name }-{ version }-{ target }.tar.gz"
          bin-dir = "{ bin }{ binary-ext }"
          pkg-fmt = "tgz"
          EOF

          cp "${TEST_WORKSPACE}/target/release/test-app" \
            "${TEST_WORKSPACE}/target/x86_64-unknown-linux-gnu/release/test-app"

          cat > "${TEST_WORKSPACE}/test-staging.toml" << 'EOF'
          [common]
          bin_name = "test-app"
          dist_dir = "dist"
          checksum_algorithm = "sha256"

          [common.binstall]
          enabled = true

          [targets.linux-x86_64]
          platform = "linux"
          arch = "x86_64"
          target = "x86_64-unknown-linux-gnu"
          EOF

      - name: Stage cargo-binstall archive
        id: stage
        uses: ./.github/actions/stage-release-artefacts
        with:
          config-file: ${{ env.TEST_WORKSPACE }}/test-staging.toml
          target: linux-x86_64

      - name: Verify cargo-binstall archive
        run: |
          archive="${{ steps.stage.outputs.binstall-archive-path }}"
          echo "binstall-archive-path=${archive}"
          [[ -n "${archive}" ]]
          [[ -f "${archive}" ]]
          [[ -f "${archive}.sha256" ]]
          tar -tzf "${archive}" | grep -Fx "test-app"
