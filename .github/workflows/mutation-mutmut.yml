name: Mutation testing (mutmut)

on:
  workflow_call:
    inputs:
      paths:
        description: >-
          Comma-separated path prefixes containing mutable Python
          source.
        type: string
        default: "src/"
      window-hours:
        description: >-
          Change-detection window in hours; keep one hour wider than the
          schedule cadence to absorb cron start-time drift.
        type: number
        default: 25
      base-ref:
        description: Reference whose history is inspected for changes.
        type: string
        default: origin/main
      timeout-minutes:
        description: Job timeout ceiling in minutes.
        type: number
        default: 90
      mutmut-version:
        description: >-
          mutmut version injected via `uv run --with`. The default is
          the version the results parser was validated against.
        type: string
        default: "3.6.0"
      module-prefix-strip:
        description: >-
          Path prefix stripped from changed files before module-glob
          translation (src-layout projects keep the default).
        type: string
        default: "src/"
      extra-args:
        description: Extra `mutmut run` arguments (shell-lexed).
        type: string
        default: ""
      python-version:
        description: >-
          Python version for uv. Must be 3.13 or newer (the workflow's
          helper scripts require >= 3.13, and setup-uv exports this as
          UV_PYTHON for the whole job) AND must satisfy the caller
          project's `requires-python`, because the run step executes
          `uv run` inside the caller's project. Projects baselined
          below 3.13 whose `requires-python` upper bound excludes 3.13
          cannot use this workflow.
        type: string
        default: "3.13"

# Default the token to no scopes; jobs opt in explicitly.
permissions: {}

jobs:
  mutants:
    runs-on: ubuntu-latest
    # The job ceiling sits at the platform maximum while the run step
    # carries the caller's `timeout-minutes` budget: a step timeout fails
    # the step (so the always() artefact upload still runs), whereas a
    # job timeout cancels everything, losing the results listing.
    timeout-minutes: 360
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate python-version
        shell: bash
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
        run: |
          set -euo pipefail
          lowest=$(printf '%s\n' "3.13" "${PYTHON_VERSION}" | sort -V | head -n 1)
          if [[ "${lowest}" != "3.13" ]]; then
            echo "python-version must be 3.13 or newer (got ${PYTHON_VERSION}):" \
              "the workflow's helper scripts require >= 3.13." >&2
            exit 1
          fi

      - name: Checkout caller repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve workflow source
        id: workflow-source
        # Pinned by SHA: this action performs the workflow-source
        # resolution, so its own reference cannot be resolved
        # dynamically. Bump the pin when the action changes.
        uses: leynos/shared-actions/.github/actions/resolve-workflow-source@62733fd653cc577f9858645d9a3e4daf90998c55

      - name: Checkout workflow repository
        if: ${{ steps.workflow-source.outputs.checkout == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ steps.workflow-source.outputs.repo }}
          ref: ${{ steps.workflow-source.outputs.ref }}
          path: workflow-src
          fetch-depth: 1
          persist-credentials: false

      - name: Install uv (act)
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade --break-system-packages uv

      - name: Setup uv
        if: ${{ env.ACT != 'true' }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          python-version: ${{ inputs.python-version }}
          # Workspace-relative on purpose: this glob is hashed before the
          # relocation step below moves workflow-src out of the workspace.
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
            **/workflow_scripts/*.py

      - name: Relocate workflow source
        # Move the workflow checkout out of the caller's workspace so
        # tree-scanning tests in the caller's suite (manifest sweeps,
        # file inventories, lint-everything globs) never see foreign
        # files during the mutation baseline or mutant runs. Runs after
        # "Setup uv" so cache-dependency-glob still hashes the workflow
        # scripts while they sit inside the workspace. Under act the
        # workspace itself is the workflow source, so nothing moves.
        id: relocate-workflow-source
        shell: bash
        env:
          CHECKOUT: ${{ steps.workflow-source.outputs.checkout }}
          WORKFLOW_DIR: ${{ steps.workflow-source.outputs.workflow_dir }}
        run: |
          set -euo pipefail
          if [[ "${CHECKOUT}" == "true" ]]; then
            dest="${RUNNER_TEMP}/workflow-src"
            rm -rf "${dest}"
            mv "${WORKFLOW_DIR}" "${dest}"
            echo "workflow_dir=${dest}" >> "${GITHUB_OUTPUT}"
          else
            echo "workflow_dir=${WORKFLOW_DIR}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Detect changed files
        id: detect
        shell: bash
        env:
          INPUT_EVENT_NAME: ${{ github.event_name }}
          INPUT_WINDOW_HOURS: ${{ inputs.window-hours }}
          INPUT_PATHS: ${{ inputs.paths }}
          INPUT_EXTRA_CRATE_DIRS: ""
          INPUT_PATHSPEC: "*.py"
          INPUT_SHARD_COUNT: "1"
          INPUT_BASE_REF: ${{ inputs.base-ref }}
          WORKFLOW_DIR: ${{ steps.relocate-workflow-source.outputs.workflow_dir }}
        run: |
          set -euo pipefail
          if [[ "${ACT:-}" == "true" ]]; then
            export UV_PROJECT_ENVIRONMENT="/tmp/uv-project"
            export UV_CACHE_DIR="/tmp/uv-cache"
          fi
          uv run --script "${WORKFLOW_DIR}/workflow_scripts/mutation_detect_changes.py"

      - name: Run mutation testing
        if: ${{ steps.detect.outputs.has_changes == 'true' }}
        shell: bash
        timeout-minutes: ${{ fromJSON(inputs.timeout-minutes) }}
        env:
          INPUT_FILES: ${{ steps.detect.outputs.root_files }}
          INPUT_MUTMUT_VERSION: ${{ inputs.mutmut-version }}
          INPUT_MODULE_PREFIX_STRIP: ${{ inputs.module-prefix-strip }}
          INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
          INPUT_RESULTS_FILE: mutation-mutmut-results.txt
          WORKFLOW_DIR: ${{ steps.relocate-workflow-source.outputs.workflow_dir }}
        run: |
          set -euo pipefail
          if [[ "${ACT:-}" == "true" ]]; then
            export UV_CACHE_DIR="/tmp/uv-cache"
          fi
          uv run --script "${WORKFLOW_DIR}/workflow_scripts/mutation_run_mutmut.py"

      - name: Upload mutation report
        if: ${{ always() && steps.detect.outputs.has_changes == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report-mutmut
          path: |
            mutation-mutmut-results.txt
            mutants/mutmut-stats.json
          if-no-files-found: warn
