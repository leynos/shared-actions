name: Setup Rust
description: Install Rust and cache cargo registry
inputs:
  toolchain:
    description: >
      Rust toolchain to install (e.g., 'stable', 'nightly', '1.70.0').
      Accepts any valid Rust toolchain identifier as supported by rustup.
    required: false
  install-postgres-deps:
    description: Install PostgreSQL system dependencies
    required: false
    default: "false"
  install-sqlite-deps:
    description: Install SQLite development libraries on Windows
    required: false
    default: "false"
  use-sccache:
    description: Enable sccache for non-release runs
    required: false
    default: "true"
  install-binstall:
    description: Install cargo-binstall for faster binary crate installations
    required: false
    default: "true"
  with-darwin:
    description: Install macOS cross build toolchain
    required: false
    default: 'false'
  darwin-sdk-version:
    description: macOS SDK version for osxcross
    required: false
    default: '12.3'
  with-openbsd:
    description: Build OpenBSD std library for cross-compilation
    required: false
    default: 'false'
  openbsd-nightly:
    description: Nightly toolchain version for OpenBSD build
    required: false
    default: 'nightly-2025-07-20'
runs:
  using: composite
  steps:
    - name: Install rust (explicit toolchain)
      if: ${{ inputs.toolchain != '' }}
      uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9
      with:
        override: true
        toolchain: ${{ inputs.toolchain }}
        components: rustfmt, clippy, llvm-tools-preview
        cache: false
    - name: Install rust (rust-toolchain file)
      if: ${{ inputs.toolchain == '' && hashFiles('rust-toolchain.toml', 'rust-toolchain') != '' }}
      uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9
      with:
        override: false
        components: rustfmt, clippy, llvm-tools-preview
        cache: false
    - name: Install rust (stable default)
      if: ${{ inputs.toolchain == '' && hashFiles('rust-toolchain.toml', 'rust-toolchain') == '' }}
      uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9
      with:
        override: true
        toolchain: stable
        components: rustfmt, clippy, llvm-tools-preview
        cache: false
    - name: Install cargo-binstall
      if: ${{ inputs.install-binstall == 'true' }}
      run: |
        set -euo pipefail
        # Keep BINSTALL_VERSION and BINSTALL_SHA256 in sync; update both together.
        # To refresh the checksum: curl -fsSL "$INSTALLER_URL" | shasum -a 256 | awk '{print $1}'
        export BINSTALL_VERSION="v1.19.1"
        BINSTALL_SHA256="d3a93702160e0ec03e2a4e996855db1f01adee801fb84a43add24e0877ef8eae"
        INSTALLER_URL="https://raw.githubusercontent.com/cargo-bins/cargo-binstall/${BINSTALL_VERSION}/install-from-binstall-release.sh"
        INSTALLER_PATH="$(mktemp)"
        trap 'rm -f "$INSTALLER_PATH"' EXIT
        curl -fsSL --proto '=https' --tlsv1.2 "$INSTALLER_URL" -o "$INSTALLER_PATH"
        if [ ! -s "$INSTALLER_PATH" ]; then
          echo "cargo-binstall installer download failed or empty" >&2
          exit 1
        fi
        if command -v sha256sum >/dev/null 2>&1; then
          ACTUAL_SHA256="$(sha256sum "$INSTALLER_PATH" | awk '{print $1}')"
        else
          ACTUAL_SHA256="$(shasum -a 256 "$INSTALLER_PATH" | awk '{print $1}')"
        fi
        if [ "$ACTUAL_SHA256" != "$BINSTALL_SHA256" ]; then
          echo "cargo-binstall install script checksum mismatch: $ACTUAL_SHA256" >&2
          exit 1
        fi
        bash "$INSTALLER_PATH"
        # The cargo-binstall installer respects CARGO_HOME and writes
        # cargo-binstall into ${CARGO_HOME:-$HOME/.cargo}/bin, so the same
        # resolution gives us the absolute path to the freshly installed binary.
        cargo_home_bin="${CARGO_HOME:-$HOME/.cargo}/bin"
        echo "cargo-binstall: resolved cargo_home_bin=${cargo_home_bin}"
        if [ -n "${GITHUB_PATH:-}" ]; then
          echo "$cargo_home_bin" >> "$GITHUB_PATH"
          echo "cargo-binstall: appended ${cargo_home_bin} to GITHUB_PATH"
        else
          echo "cargo-binstall: GITHUB_PATH not set; skipping GITHUB_PATH append"
        fi
        case ":$PATH:" in
          *":$cargo_home_bin:"*)
            echo "cargo-binstall: ${cargo_home_bin} already on PATH; skipping prepend"
            ;;
          *)
            export PATH="$cargo_home_bin:$PATH"
            echo "cargo-binstall: prepended ${cargo_home_bin} to PATH"
            ;;
        esac
        cargo_binstall="$cargo_home_bin/cargo-binstall"
        binstall_ver="${BINSTALL_VERSION#v}"
        if ! "$cargo_binstall" -V | grep -qF "$binstall_ver"; then
          echo "cargo-binstall version verification failed: expected $binstall_ver" >&2
          "$cargo_binstall" -V >&2
          exit 1
        fi
        echo "cargo-binstall $("$cargo_binstall" -V) verified"
      shell: bash
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        cache-dependency-glob: |
          **/pyproject.toml
          **/uv.lock
          **/scripts/*.py
    - name: Install nightly toolchain (needed for OpenBSD cross-compilation)
      if: ${{ inputs.with-openbsd == 'true' && runner.os == 'Linux' }}
      run: |
        set -euo pipefail
        OPENBSD_NIGHTLY='${{ inputs.openbsd-nightly }}'
        NIGHTLY_DATE="${OPENBSD_NIGHTLY#nightly-}"
        curl -fsI "https://static.rust-lang.org/dist/${NIGHTLY_DATE}/channel-rust-nightly.toml" >/dev/null
        rustup toolchain install --profile minimal "$OPENBSD_NIGHTLY"
        echo "OPENBSD_NIGHTLY=$OPENBSD_NIGHTLY" >> "$GITHUB_ENV"
        echo "NIGHTLY_SYSROOT=$(rustc +$OPENBSD_NIGHTLY --print sysroot)" >> "$GITHUB_ENV"
      shell: bash
    - name: Cache cargo registry
      # v4.3.0
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/${{ env.BUILD_PROFILE }}
        key: ${{ runner.os }}-cargo-${{ env.BUILD_PROFILE }}-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ env.BUILD_PROFILE }}-
    # x86_64-apple-darwin binaries were dropped after sccache v0.12.0
    - name: Run sccache (x86_64 macOS)
      if: ${{ inputs.use-sccache == 'true' && github.event_name != 'release' && runner.os == 'macOS' && runner.arch == 'X64' }}
      uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad
      with:
        version: v0.12.0
    - name: Run sccache
      if: ${{ inputs.use-sccache == 'true' && github.event_name != 'release' && !(runner.os == 'macOS' && runner.arch == 'X64') }}
      uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad
    - name: Install system dependencies
      if: ${{ inputs.install-postgres-deps == 'true' && runner.os == 'Linux' }}
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev
      shell: bash
    - name: Install libpq (headers + import library)
      if: ${{ inputs.install-postgres-deps == 'true' && runner.os == 'Windows' }}
      shell: pwsh
      run: |
        # Install PostgreSQL 17 but suppress the server service – we only need the client bits
        choco install postgresql17 --no-progress -y --params '/Password:postgres /NoService /SkipStackBuilder'

        # Tell the rest of the job where the headers and import library are
        $pgRoot = "${Env:ProgramFiles}\PostgreSQL\17"
        "PG_INCLUDE=$pgRoot\include" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
        "PG_LIB=$pgRoot\lib"         | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
        echo "$pgRoot\bin"           | Out-File -FilePath $Env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install MSYS2 toolchain and SQLite
      if: ${{ inputs.install-sqlite-deps == 'true' && runner.os == 'Windows' }}
      # v2.30.0
      uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-sqlite3
    - name: Setup osxcross (macOS SDK + linker)
      if: ${{ inputs.with-darwin == 'true' && runner.os == 'Linux' }}
      uses: mbround18/setup-osxcross@b26146d499c54979ed3d023266865dc188881911
      with:
        osx-version: ${{ inputs.darwin-sdk-version }}
    - name: Install Rust macOS targets
      if: ${{ inputs.with-darwin == 'true' && runner.os == 'Linux' }}
      run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      shell: bash
    - name: Cache OpenBSD stdlib
      if: ${{ inputs.with-openbsd == 'true' && runner.os == 'Linux' }}
      id: openbsd-stdlib-cache
      # v4.3.0
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: ${{ env.NIGHTLY_SYSROOT }}/lib/rustlib/x86_64-unknown-openbsd
        key: openbsd-stdlib-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}
    - name: Clone Rust repo & build OpenBSD std
      if: ${{ inputs.with-openbsd == 'true' && runner.os == 'Linux' && steps.openbsd-stdlib-cache.outputs.cache-hit != 'true' }}
      run: |
        git clone --depth 1 --single-branch https://github.com/rust-lang/rust.git
        cd rust
        HOST_TRIPLE=$(rustc -vV | grep '^host:' | awk '{print $2}')
        ./x.py build --stage 1 --target x86_64-unknown-openbsd library/std
        ARTEFACT_DIR="build/$HOST_TRIPLE/stage1/lib/rustlib/x86_64-unknown-openbsd"
        uv run --script "${{ github.action_path }}/scripts/copy_openbsd_stdlib.py" \
          "$ARTEFACT_DIR" "$NIGHTLY_SYSROOT"
      shell: bash
    - name: Add OpenBSD target
      if: ${{ inputs.with-openbsd == 'true' && runner.os == 'Linux' }}
      run: rustup target add x86_64-unknown-openbsd --toolchain ${{ env.OPENBSD_NIGHTLY }}
      shell: bash
