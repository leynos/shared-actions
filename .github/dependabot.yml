version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for Python (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for Cargo (rust-toy-app test crate)
  - package-ecosystem: "cargo"
    directory: "/rust-toy-app"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "cargo"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 14
